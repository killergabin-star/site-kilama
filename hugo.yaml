## PARAMS
############################
params:
  marketing:
    seo:
      site_type: Person
      local_business_type: ''
      org_name: ''
      description: "Eric Gabin Kilama — Macroéconomiste, Conseiller stratégique, Chercheur"
      twitter: ''
  appearance:
    theme_day: kilama
    theme_night: kilama
    font: native
    font_size: M
  features:
    math:
      enable: false
  header:
    navbar:
      enable: true
      align: c
      show_logo: true
      show_language: true
      show_day_night: true
      show_search: false
  footer:
