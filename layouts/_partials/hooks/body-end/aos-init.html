<!-- AOS.js — Scroll animation library -->
<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script>
  AOS.init({
    duration: 700,
    easing: 'ease-out-cubic',
    once: true,
    offset: 60,
    delay: 0
  });

  // Mazzucato approach: NO heavy scroll animations on sections.
  // Clean, institutional, flat. AOS available for individual elements
  // via data-aos attributes in HTML if needed, but not auto-applied.

  // Mazzucato-style FIXED header with transparent→opaque transition
  (function() {
    var header = document.querySelector('#site-header');
    var hero = document.querySelector('.blox-hero');
    var body = document.body;

    // On pages WITH hero: transparent header over hero, opaque when scrolled
    if (hero) {
      body.classList.add('has-hero');

      function updateHeader() {
        var heroBottom = hero.getBoundingClientRect().bottom;
        if (heroBottom > 80) {
          body.classList.add('header-over-hero');
          if (header) header.classList.remove('header-scrolled');
        } else {
          body.classList.remove('header-over-hero');
          if (header) header.classList.add('header-scrolled');
        }
      }

      updateHeader();
      window.addEventListener('scroll', updateHeader, { passive: true });
    } else {
      // On pages WITHOUT hero: add scroll shadow after minimal scroll
      if (header) {
        function updateScrollShadow() {
          if (window.scrollY > 10) {
            header.classList.add('header-scrolled');
          } else {
            header.classList.remove('header-scrolled');
          }
        }
        updateScrollShadow();
        window.addEventListener('scroll', updateScrollShadow, { passive: true });
      }
    }
  })();

  // ── CHANTIER 1: Typographic logo + social icons ──
  (function() {
    // Reformat brand: "Eric Gabin Kilama" → two-line ERIC GABIN / KILAMA
    var brand = document.querySelector('.navbar-brand');
    if (brand) {
      var text = brand.textContent.trim();
      // Keep the href
      var href = brand.getAttribute('href') || '/';
      brand.innerHTML = '<span class="brand-first">ERIC GABIN</span><span class="brand-last">KILAMA</span>';
    }

    // Inject social icons next to theme toggle / language switcher
    var navbar = document.querySelector('.navbar');
    if (navbar) {
      // Target the desktop right area (theme toggle + language)
      var rightArea = navbar.querySelector('.order-1.ml-auto') ||
                      navbar.querySelector('[class*="md:order-2"]');
      if (rightArea) {
        var socialDiv = document.createElement('div');
        socialDiv.className = 'header-social-icons';
        socialDiv.innerHTML = '' +
          '<a href="https://www.linkedin.com/in/eric-gabin-kilama-aa4b4941" target="_blank" rel="noopener" aria-label="LinkedIn">' +
            '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>' +
          '</a>' +
          '<a href="https://twitter.com/" target="_blank" rel="noopener" aria-label="X / Twitter">' +
            '<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>' +
          '</a>';
        // Insert before the first button/toggle in the right area
        rightArea.insertBefore(socialDiv, rightArea.firstChild);
      }
    }
  })();
</script>
