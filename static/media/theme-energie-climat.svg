  <circle cx="480" cy="380" r="12" fill="none" stroke="#5eead4" stroke-width="0.8" opacity="0.12"/>
  <circle cx="460" cy="365" r="8" fill="none" stroke="#5eead4" stroke-width="0.8" opacity="0.1"/>
  <circle cx="500" cy="370" r="8" fill="none" stroke="#5eead4" stroke-width="0.8" opacity="0.1"/>
</svg>