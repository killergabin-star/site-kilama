  <line x1="300" y1="280" x2="280" y2="240" stroke="#5eead4" stroke-width="1" opacity="0.08"/>
  <line x1="300" y1="280" x2="325" y2="245" stroke="#5eead4" stroke-width="1" opacity="0.08"/>
  <line x1="300" y1="280" x2="297" y2="330" stroke="#5eead4" stroke-width="1" opacity="0.08"/>
  <circle cx="300" cy="280" r="3" fill="#5eead4" opacity="0.1"/>
  <!-- Temperature curve -->
  <path d="M 100 350 Q 200 345 300 340 Q 400 330 500 300 Q 550 280 600 250 Q 650 230 700 200"
