  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Energy/climate pattern -->
  <!-- Sun rays -->
  <circle cx="600" cy="120" r="40" fill="#fbbf24" opacity="0.08"/>
  <circle cx="600" cy="120" r="25" fill="#fbbf24" opacity="0.1"/>
  <line x1="600" y1="60" x2="600" y2="40" stroke="#fbbf24" stroke-width="1.5" opacity="0.1"/>
  <line x1="640" y1="80" x2="655" y2="65" stroke="#fbbf24" stroke-width="1.5" opacity="0.1"/>
  <line x1="560" y1="80" x2="545" y2="65" stroke="#fbbf24" stroke-width="1.5" opacity="0.1"/>
  <line x1="660" y1="120" x2="680" y2="120" stroke="#fbbf24" stroke-width="1.5" opacity="0.1"/>
  <!-- Wind turbine silhouettes -->
  <line x1="200" y1="400" x2="200" y2="250" stroke="#5eead4" stroke-width="2" opacity="0.15"/>
  <line x1="200" y1="250" x2="175" y2="200" stroke="#5eead4" stroke-width="1.5" opacity="0.12"/>
  <line x1="200" y1="250" x2="230" y2="210" stroke="#5eead4" stroke-width="1.5" opacity="0.12"/>
