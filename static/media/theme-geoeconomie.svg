<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003366"/>
      <stop offset="100%" style="stop-color:#1a5276"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#79b8ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#003366;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Abstract globe/network pattern -->
  <circle cx="400" cy="250" r="180" fill="none" stroke="#79b8ff" stroke-width="0.8" opacity="0.3"/>
  <circle cx="400" cy="250" r="140" fill="none" stroke="#79b8ff" stroke-width="0.5" opacity="0.2"/>
  <circle cx="400" cy="250" r="100" fill="none" stroke="#79b8ff" stroke-width="0.5" opacity="0.15"/>
  <ellipse cx="400" cy="250" rx="180" ry="60" fill="none" stroke="#79b8ff" stroke-width="0.5" opacity="0.2"/>
  <ellipse cx="400" cy="250" rx="180" ry="120" fill="none" stroke="#79b8ff" stroke-width="0.5" opacity="0.15"/>
  <!-- Meridians -->
  <ellipse cx="400" cy="250" rx="60" ry="180" fill="none" stroke="#79b8ff" stroke-width="0.5" opacity="0.15" transform="rotate(30 400 250)"/>
  <ellipse cx="400" cy="250" rx="60" ry="180" fill="none" stroke="#79b8ff" stroke-width="0.5" opacity="0.15" transform="rotate(-30 400 250)"/>
  <!-- Connection nodes -->
  <circle cx="300" cy="180" r="4" fill="#79b8ff" opacity="0.6"/>
  <circle cx="500" cy="200" r="3" fill="#79b8ff" opacity="0.5"/>
  <circle cx="350" cy="320" r="3.5" fill="#79b8ff" opacity="0.5"/>
  <circle cx="480" cy="300" r="3" fill="#79b8ff" opacity="0.4"/>
  <circle cx="250" cy="260" r="3" fill="#79b8ff" opacity="0.4"/>
  <circle cx="550" cy="240" r="4" fill="#79b8ff" opacity="0.5"/>
  <!-- Connection lines -->
  <line x1="300" y1="180" x2="500" y2="200" stroke="#79b8ff" stroke-width="0.5" opacity="0.3"/>
  <line x1="500" y1="200" x2="480" y2="300" stroke="#79b8ff" stroke-width="0.5" opacity="0.25"/>
  <line x1="300" y1="180" x2="350" y2="320" stroke="#79b8ff" stroke-width="0.5" opacity="0.2"/>
  <line x1="250" y1="260" x2="350" y2="320" stroke="#79b8ff" stroke-width="0.5" opacity="0.25"/>
  <line x1="550" y1="240" x2="500" y2="200" stroke="#79b8ff" stroke-width="0.5" opacity="0.2"/>
  <line x1="550" y1="240" x2="480" y2="300" stroke="#79b8ff" stroke-width="0.5" opacity="0.2"/>
  <!-- Light accent overlay -->
  <rect x="0" y="350" width="800" height="150" fill="url(#accent)"/>
</svg>