<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c2d12"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <!-- Data/econometrics pattern -->
  <!-- Scatter plot dots -->
  <circle cx="200" cy="350" r="3" fill="#fcd34d" opacity="0.3"/>
  <circle cx="230" cy="330" r="2.5" fill="#fcd34d" opacity="0.25"/>
  <circle cx="260" cy="310" r="3" fill="#fcd34d" opacity="0.3"/>
  <circle cx="280" cy="340" r="2" fill="#fcd34d" opacity="0.2"/>
  <circle cx="310" cy="290" r="3" fill="#fcd34d" opacity="0.3"/>
  <circle cx="340" cy="270" r="2.5" fill="#fcd34d" opacity="0.25"/>
  <circle cx="360" cy="300" r="2" fill="#fcd34d" opacity="0.2"/>
  <circle cx="390" cy="250" r="3" fill="#fcd34d" opacity="0.3"/>
  <circle cx="420" cy="240" r="2.5" fill="#fcd34d" opacity="0.25"/>
  <circle cx="450" cy="220" r="3" fill="#fcd34d" opacity="0.3"/>
  <circle cx="470" cy="260" r="2" fill="#fcd34d" opacity="0.2"/>
  <circle cx="500" cy="200" r="2.5" fill="#fcd34d" opacity="0.25"/>
  <circle cx="530" cy="190" r="3" fill="#fcd34d" opacity="0.3"/>
  <circle cx="560" cy="170" r="2.5" fill="#fcd34d" opacity="0.25"/>
  <circle cx="580" cy="200" r="2" fill="#fcd34d" opacity="0.2"/>
  <circle cx="610" cy="160" r="3" fill="#fcd34d" opacity="0.3"/>
  <!-- Regression line -->
  <line x1="180" y1="370" x2="630" y2="140" stroke="#fcd34d" stroke-width="1.5" opacity="0.3"/>
  <!-- Confidence bands -->
  <path d="M 180 350 Q 400 200 630 120" fill="none" stroke="#fcd34d" stroke-width="0.5" opacity="0.15" stroke-dasharray="4 4"/>
  <path d="M 180 390 Q 400 280 630 160" fill="none" stroke="#fcd34d" stroke-width="0.5" opacity="0.15" stroke-dasharray="4 4"/>
  <!-- Mathematical symbols -->
  <text x="150" y="120" font-family="serif" font-size="28" fill="#fcd34d" opacity="0.12">&#x03B2;</text>
  <text x="620" y="100" font-family="serif" font-size="24" fill="#fcd34d" opacity="0.1">&#x03B5;</text>
  <text x="350" y="130" font-family="serif" font-size="22" fill="#fcd34d" opacity="0.08">&#x0394;</text>
  <text x="500" y="420" font-family="serif" font-size="20" fill="#fcd34d" opacity="0.1">&#x03A3;</text>
  <!-- Axes -->
  <line x1="160" y1="100" x2="160" y2="400" stroke="#fcd34d" stroke-width="0.8" opacity="0.15"/>
  <line x1="160" y1="400" x2="660" y2="400" stroke="#fcd34d" stroke-width="0.8" opacity="0.15"/>
</svg>