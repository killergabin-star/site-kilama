<!DOCTYPE html>
<html lang="{{ .Site.Language.Lang }}">
<head>
  {{ partial "head.html" . }}
  <title>Page introuvable — Eric Kilama</title>
  <style>
    .error-page {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--ivory);
      padding: 40px;
    }
    .error-inner { text-align: center; max-width: 500px; }
    .error-code {
      font-family: var(--font-data);
      font-size: 96px;
      font-weight: 300;
      color: var(--navy);
      line-height: 1;
      margin-bottom: 16px;
    }
    .error-title {
      font-family: var(--font-title);
      font-size: 24px;
      font-weight: 500;
      color: var(--navy);
      margin-bottom: 16px;
    }
    .error-text {
      font-family: var(--font-title);
      font-size: 16px;
      color: var(--gray-500);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .error-link {
      font-family: var(--font-title);
      font-size: 16px;
      font-weight: 500;
      color: var(--white);
      background: var(--navy);
      padding: 12px 32px;
      text-decoration: none;
      display: inline-block;
    }
    .error-link:hover { background: var(--blue-fpsq); }
  </style>
</head>
<body>
  {{ partial "nav.html" . }}
  <div class="error-page">
    <div class="error-inner">
      <div class="error-code">404</div>
      <h1 class="error-title">Page introuvable</h1>
      <p class="error-text">La page que vous cherchez n'existe pas ou a été déplacée.</p>
      <a href="{{ "/" | relURL }}" class="error-link">Retour à l'accueil</a>
    </div>
  </div>
  {{ partial "footer.html" . }}
</body>
</html>
